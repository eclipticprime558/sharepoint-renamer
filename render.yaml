services:
  - type: web
    name: sharepoint-renamer
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AZURE_CLIENT_ID
        sync: false   # set this in Render dashboard after registering your Azure app
